server:
  port: 8080

spring:
  application:
    name: it-training-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/it_training?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.company.training.modules
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.company.training: info

app:
  upload-dir: ./uploads
